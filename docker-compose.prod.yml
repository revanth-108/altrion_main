version: "3.9"

services:
  api:
    build:
      context: ./Backend-Main
    env_file:
      - ./Backend-Main/.env
    depends_on:
      - redis
    restart: unless-stopped
    expose:
      - "8000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
