version: "3.9"

services:
  api:
    build:
      context: ./Backend-Main
    env_file:
      - ./Backend-Main/.env
    ports:
      - "8000:8000"
    depends_on:
      - redis

  web:
    build:
      context: ./Frontend-Main
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
